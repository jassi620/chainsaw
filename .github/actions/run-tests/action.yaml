name: "Run E2E Tests"
description: "Execute E2E"
inputs:
  path:
    description: Tests path
    default: '.'
  tests:
    description: "Test regex"
    default: ''
  shard-index:
    description: Shard index
    default: '0'
  shard-count:
    description: Shard count
    default: '0'
  chainsaw-version:
    description: Chainsaw release tag to install
    default: 'v0.2.14'
runs:
  using: "composite"
  steps:
    - name: Install Cosign
      uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad # v4.0.0

    - name: Install Chainsaw (binary)
      shell: bash
      run: |
        set -euo pipefail

        VERSION="${{ inputs.chainsaw-version }}"
        OS="$(uname -s | tr '[:upper:]' '[:lower:]')"
        ARCH="$(uname -m)"

        case "${ARCH}" in
          x86_64) ARCH="amd64" ;;
          aarch64|arm64) ARCH="arm64" ;;
          *)
            echo "Unsupported architecture: ${ARCH}"
            exit 1
            ;;
        esac
        export VERSION OS ARCH

        ASSET_URL="$(python3 - <<'PY'
        import json, os, re, urllib.request

        version = os.environ["VERSION"]
        os_name = os.environ["OS"]
        arch = os.environ["ARCH"]
        api = f"https://api.github.com/repos/kyverno/chainsaw/releases/tags/{version}"

        with urllib.request.urlopen(api) as r:
            data = json.load(r)

        pattern = re.compile(rf"chainsaw.*{os_name}.*{arch}.*\.tar\.gz$")
        for a in data.get("assets", []):
            name = a.get("name", "")
            if pattern.search(name):
                print(a["browser_download_url"])
                break
        else:
            raise SystemExit(
                f"No matching chainsaw asset found for {os_name}/{arch} in {version}"
            )
        PY
        )"

        curl -fsSL -o /tmp/chainsaw.tar.gz "${ASSET_URL}"
        tar -xzf /tmp/chainsaw.tar.gz -C /tmp
        install -m 0755 /tmp/chainsaw "${RUNNER_TEMP}/chainsaw"
        echo "${RUNNER_TEMP}" >> "${GITHUB_PATH}"
        "${RUNNER_TEMP}/chainsaw" version

    - name: Test with Chainsaw
      shell: bash
      run: |
        set -e
        chainsaw test ${{ inputs.path }} \
          --config .chainsaw.yaml \
          --include-test-regex '^chainsaw$/${{ inputs.tests }}' \
          --shard-index ${{ inputs.shard-index }} \
          --shard-count ${{ inputs.shard-count }} \
          --no-color=false \
          --report-format JSON \
          --report-name chainsaw-report \
          --report-path /tmp

    - name: Publish Chainsaw report (table)
      if: ${{ always() }}
      shell: bash
      run: |
        set -euo pipefail

        REPORT_DIR="/tmp"
        REPORT_FILE="$(find "${REPORT_DIR}" -maxdepth 1 -type f \( -name 'chainsaw-report*.json' -o -name 'chainsaw-report' \) | head -n 1 || true)"

        for attempt in 1 2 3; do
          REPORT_FILE="$(find "${REPORT_DIR}" -maxdepth 1 -type f \( -name 'chainsaw-report*.json' -o -name 'chainsaw-report' \) | head -n 1 || true)"
          if [[ -n "${REPORT_FILE}" ]]; then
            break
          fi

          if [[ "${attempt}" -lt 3 ]]; then
            echo "Report file not found (attempt ${attempt}/3). Retrying in 5s..."
            sleep 5
          fi
        done

        python3 - "${REPORT_FILE}" >> "${GITHUB_STEP_SUMMARY}" <<'PY'
        import json
        import sys
        from pathlib import Path

        report_file = Path(sys.argv[1])
        data = json.loads(report_file.read_text())

        def pick(d, *keys, default=""):
            if not isinstance(d, dict):
                return default
            for k in keys:
                if k in d and d[k] is not None:
                    return d[k]
            return default

        def esc(v):
            s = str(v) if v is not None else ""
            return s.replace("|", r"\|").replace("\n", " ")

        summary = pick(data, "summary", default={})
        if not isinstance(summary, dict):
            summary = {}

        total = pick(summary, "total", "tests", "count", default="")
        passed = pick(summary, "passed", "success", default="")
        failed = pick(summary, "failed", "failures", default="")
        skipped = pick(summary, "skipped", default="")
        duration = pick(summary, "duration", "elapsed", default="")

        tests = pick(data, "tests", "results", "items", default=[])
        if not isinstance(tests, list):
            tests = []

        print("### Chainsaw Test Report")
        print("")
        print("| Report File | Total | Passed | Failed | Skipped | Duration |")
        print("|---|---:|---:|---:|---:|---:|")
        print(f"| `{esc(report_file)}` | {esc(total)} | {esc(passed)} | {esc(failed)} | {esc(skipped)} | {esc(duration)} |")

        if tests:
            print("")
            print("| Test | Status | Duration | Message |")
            print("|---|---|---:|---|")
            for t in tests:
                if not isinstance(t, dict):
                    continue
                name = pick(t, "name", "test", "id", default="-")
                status = pick(t, "status", "result", default="-")
                td = pick(t, "duration", "elapsed", default="-")
                msg = pick(t, "message", "error", default="")
                print(f"| {esc(name)} | {esc(status)} | {esc(td)} | {esc(msg)} |")
        PY

