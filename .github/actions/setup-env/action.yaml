name: "Setup Environment for E2E Tests"
description: "Sets up the environment for the E2E workflows"
inputs:
  k8s-version:
    description: "Kubernetes version"
    required: true
runs:
  using: "composite"
  steps:
    - name: Setup Go
      uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c # v6.1.0
      with:
        go-version: ~1.26.1
    # - name: Install Tools
    #   shell: bash
    #   run: |
    #     set -e
    #     curl -LO "https://dl.k8s.io/release/${{ inputs.k8s-version }}/bin/linux/amd64/kubectl"
    #     sudo install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl
    - name: Install kind
      shell: bash
      run: |
        set -e
        # For AMD64 / x86_64
        [ $(uname -m) = x86_64 ] && curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.20.0/kind-linux-amd64
        # For ARM64
        [ $(uname -m) = aarch64 ] && curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.20.0/kind-linux-arm64
        chmod +x ./kind
        sudo mv ./kind /usr/local/bin/kind
    # - name: Install latest Kyverno CLI
    #   uses: kyverno/action-install-cli@fcee92fca5c883169ef9927acf543e0b5fc58289 # v0.2.0
    - name: Install latest Kyverno CLI (binary)
      shell: bash
      run: |
        set -euo pipefail

        ARCH="$(uname -m)"
        case "${ARCH}" in
          x86_64) ARCH="x86_64" ;;
          aarch64|arm64) ARCH="arm64" ;;
          *)
            echo "Unsupported architecture: ${ARCH}"
            exit 1
            ;;
        esac
        export ARCH

        ASSET_URL="$(python3 - <<'PY'
        import json, os, re, urllib.request

        api = "https://api.github.com/repos/kyverno/kyverno/releases/latest"
        with urllib.request.urlopen(api) as r:
            data = json.load(r)

        arch = os.environ["ARCH"]
        pattern = re.compile(rf"kyverno-cli_.*_linux_{arch}\.tar\.gz$")

        for a in data.get("assets", []):
            name = a.get("name", "")
            if pattern.search(name):
                print(a["browser_download_url"])
                break
        else:
            raise SystemExit(f"No matching Kyverno CLI asset found for arch={arch}")
        PY
        )"

        curl -fsSL -o /tmp/kyverno-cli.tar.gz "${ASSET_URL}"
        tar -xzf /tmp/kyverno-cli.tar.gz -C /tmp
        sudo install -m 0755 /tmp/kyverno /usr/local/bin/kyverno
        kyverno version


    - name: Create kind cluster
      shell: bash
      run: |
        set -e
        kind create cluster --image kindest/node:${{ inputs.k8s-version }} --config ./.github/kind.yaml
        
    - name: Install latest kyverno
      shell: bash
      run: |
        set -e
        kubectl create -f https://github.com/kyverno/kyverno/raw/main/config/install-latest-testing.yaml
        
    - name: Wait for kyverno ready
      shell: bash
      run: |
        set -e
        kubectl wait --namespace kyverno --for=condition=ready pod --selector '!job-name' --timeout=120s
